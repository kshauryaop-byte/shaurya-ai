<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaurya AI | Interactive Portfolio</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root { --primary: #38bdf8; --secondary: #818cf8; --accent: #f472b6; --bg: #030712; }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; }

        /* Login Screen */
        #login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; transition: 0.8s; }
        .auth-box { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 320px; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white; outline: none; }
        
        .btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: scale(1.03); box-shadow: 0 0 15px var(--primary); }

        /* Main Content */
        #main-content { display: none; opacity: 0; transition: 1s; padding: 20px; }
        section { min-height: 100vh; padding: 60px 0; max-width: 900px; margin: auto; text-align: center; }
        
        .hero h1 { font-size: 3.5rem; background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        
        /* Tool Cards */
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 40px; }
        .tool-card { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); transition: 0.4s; text-align: left; }
        .tool-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .tool-card h3 { color: var(--primary); margin-top: 0; }
        
        .result-box { margin-top: 15px; padding: 10px; background: rgba(56, 189, 248, 0.1); border-radius: 5px; font-family: monospace; min-height: 40px; word-break: break-all; }

        footer { margin-top: 50px; padding: 30px; border-top: 1px solid rgba(255,255,255,0.1); color: #64748b; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div id="login-screen">
        <div class="auth-box">
            <h2>Shaurya AI</h2>
            <input type="text" id="user-name" placeholder="Enter Your Name">
            <button class="btn" onclick="login()">Open Dashboard</button>
        </div>
    </div>

    <div id="main-content">
        <section class="hero">
            <h1 id="greet">Namaste!</h1>
            <p style="color: #94a3b8;">Main Shaurya hoon. Neeche mere banaye huye interactive tools dekhiye.</p>
            
            <div class="tools-grid">
                <div class="tool-card">
                    <h3>1. Text Transformer</h3>
                    <p style="font-size: 0.8rem; color: gray;">Frontend JS Tool</p>
                    <textarea id="textInput" placeholder="Yahan kuch likhein..."></textarea>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn" onclick="transformText('up')">UPPER</button>
                        <button class="btn" onclick="transformText('low')">lower</button>
                    </div>
                    <div class="result-box" id="textResult">Result yahan dikhega...</div>
                </div>

                <div class="tool-card">
                    <h3>2. Prompt Engineer</h3>
                    <p style="font-size: 0.8rem; color: gray;">AI Logic Tool</p>
                    <input type="text" id="topic" placeholder="Topic (e.g. Coding)">
                    <button class="btn" onclick="generatePrompt()">Generate Prompt</button>
                    <div class="result-box" id="promptResult">Aapka AI Prompt yahan banega...</div>
                </div>

                <div class="tool-card">
                    <h3>3. Smart Calculator</h3>
                    <p style="font-size: 0.8rem; color: gray;">Computation Tool</p>
                    <input type="text" id="calcInput" placeholder="Example: 50 + 20 * 2">
                    <button class="btn" onclick="calculate()">Solve It</button>
                    <div class="result-box" id="calcResult">Ans: 0</div>
                </div>
            </div>
        </section>

        <footer>
            <p>Shaurya AI Labs &copy; 2026</p>
            <button class="btn" style="width: auto; background: none; color: gray;" onclick="location.reload()">Logout</button>
        </footer>
    </div>

    <script>
        // Login Logic
        function login() {
            const name = document.getElementById('user-name').value;
            if(!name) return alert("Please enter your name!");
            document.getElementById('greet').innerText = "Namaste, " + name + "!";
            document.getElementById('login-screen').style.display = "none";
            const main = document.getElementById('main-content');
            main.style.display = "block";
            setTimeout(() => { main.style.opacity = "1"; }, 50);
        }

        // Tool 1: Text Logic
        function transformText(mode) {
            const val = document.getElementById('textInput').value;
            document.getElementById('textResult').innerText = mode === 'up' ? val.toUpperCase() : val.toLowerCase();
        }

        // Tool 2: AI Prompt Logic
        function generatePrompt() {
            const topic = document.getElementById('topic').value;
            if(!topic) return alert("Topic daalein!");
            document.getElementById('promptResult').innerText = `Act as an expert in ${topic}. Explain the core concepts of ${topic} like I am five years old, and provide 3 practical examples.`;
        }

        // Tool 3: Calc Logic
        function calculate() {
            try {
                const res = eval(document.getElementById('calcInput').value);
                document.getElementById('calcResult').innerText = "Ans: " + res;
            } catch(e) {
                document.getElementById('calcResult').innerText = "Error: Invalid Math!";
            }
        }

        // Particles
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60 },
                "color": { "value": "#38bdf8" },
                "line_linked": { "enable": true, "opacity": 0.1 },
                "move": { "speed": 1.2 }
            }
        });
    </script>
</body>
</html>
