<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shaurya website</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 p-6 flex justify-between items-center glass">
        <div class="text-2xl font-bold tracking-tighter">LOGO</div>
        <ul class="flex gap-8 font-medium">
            <li class="hover:text-blue-400 cursor-pointer transition">Home</li>
            <li class="hover:text-blue-400 cursor-pointer transition">About</li>
            <li class="bg-blue-600 px-4 py-1 rounded-full cursor-pointer hover:bg-blue-500 transition">Contact</li>
        </ul>
    </nav>

    <section class="h-screen flex flex-col justify-center items-center text-center p-4">
        <h1 data-aos="zoom-in" data-aos-duration="1000" class="text-6xl md:text-8xl font-black mb-4">
            I am <span class="gradient-text text-uppercase">[YOUR NAME]</span>
        </h1>
        <p data-aos="fade-up" data-aos-delay="300" class="text-gray-400 text-xl max-w-2xl">
            Creating digital experiences that matter. Welcome to my premium space.
        </p>
        <div data-aos="fade-up" data-aos-delay="600" class="mt-8">
            <button class="bg-white text-black px-8 py-3 rounded-full font-bold hover:scale-105 transition-transform">Explore My Work</button>
        </div>
    </section>

    <section class="py-20 px-10 grid grid-cols-1 md:grid-cols-3 gap-8">
        <div data-aos="fade-right" class="glass p-8 rounded-3xl h-64 flex items-end">
            <h3 class="text-2xl font-bold">Innovation</h3>
        </div>
        <div data-aos="fade-up" class="glass p-8 rounded-3xl h-64 flex items-end border-blue-500/50">
            <h3 class="text-2xl font-bold">Premium Design</h3>
        </div>
        <div data-aos="fade-left" class="glass p-8 rounded-3xl h-64 flex items-end">
            <h3 class="text-2xl font-bold">Smooth Experience</h3>
        </div>
    </section>

    <footer class="p-10 text-center text-gray-500 border-t border-gray-800">
        &copy; 2024 Your Name. All Rights Reserved.
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: false });
    </script>
</body>
</html>
